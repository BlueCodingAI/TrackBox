<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackBox — Track Any Package</title>
  <meta name="description" content="Track any package by number — real-time status, milestones and full delivery history in a beautiful, simple interface." />
  <meta name="theme-color" content="#0a0d14" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%A6%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="aurora" aria-hidden="true">
    <span class="a1"></span><span class="a2"></span><span class="a3"></span><span class="a4"></span>
  </div>
  <div class="grid-overlay" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">📦</span>
      <span class="brand-name">Track<span class="brand-accent">Box</span></span>
    </div>
    <div class="live-pill"><span class="live-dot"></span>Real-time tracking</div>
  </header>

  <main class="container">
    <section class="hero">
      <h1 class="hero-title">
        <span class="line">Track any package,</span>
        <span class="line gradient-text">anywhere on Earth.</span>
      </h1>
      <p class="subtitle">Enter a tracking number to watch its journey unfold — live status, milestones, and every scan along the way.</p>

      <form id="track-form" class="search" autocomplete="off">
        <div class="search-row">
          <div class="field number-field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg>
            </span>
            <input id="number" name="number" type="text" inputmode="latin"
                   placeholder="Enter tracking number" aria-label="Tracking number" required />
          </div>
          <div class="field carrier-field">
            <input id="carrier-input" type="text" placeholder="Carrier (optional)" aria-label="Carrier" autocomplete="off" />
            <input id="carrier-code" type="hidden" />
            <ul id="carrier-list" class="carrier-suggest" role="listbox"></ul>
          </div>
          <button type="submit" id="track-btn" class="btn-primary">
            <span class="btn-shine" aria-hidden="true"></span>
            <span class="btn-label">Track</span>
            <span class="spinner" hidden aria-hidden="true"></span>
          </button>
        </div>
      </form>
    </section>

    <section id="state" class="state" hidden></section>
    <section id="result" class="result" hidden></section>
  </main>

  <footer class="footer">
    <span>Made with care · TrackBox</span>
  </footer>

  <template id="event-template">
    <li class="event">
      <span class="event-dot"><span class="event-ring"></span></span>
      <div class="event-card">
        <p class="event-desc"></p>
        <div class="event-meta">
          <span class="event-loc"></span>
          <span class="event-time"></span>
        </div>
      </div>
    </li>
  </template>

  <script src="/app.js"></script>
</body>
</html>
