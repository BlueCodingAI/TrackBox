[pytest]
testpaths = tests
# Put the project root on sys.path so `import app` works regardless of the
# directory pytest is launched from (tests/ has no __init__.py, so without
# this pytest only adds tests/ to sys.path and `app` is not importable).
pythonpath = .
# The unraisableexception plugin can trigger a native access violation on
# Windows during GC of TestClient's background thread (a benign unclosed
# resource). Disabling it keeps the suite stable without hiding test failures.
addopts = -p no:unraisableexception
filterwarnings =
    ignore::DeprecationWarning
