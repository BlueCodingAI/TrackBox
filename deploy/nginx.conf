# TrackBox — Nginx reverse proxy
# Copy to /etc/nginx/sites-available/trackbox and symlink into sites-enabled.
server {
    listen 80;
    server_name your-domain.com;   # or "_" to serve on the bare IP

    # Frontend + API are both served by the app on 127.0.0.1:8000.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # A scrape lookup can take 10–45s, so allow a generous upstream timeout.
        proxy_connect_timeout 10s;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    client_max_body_size 1m;
}
