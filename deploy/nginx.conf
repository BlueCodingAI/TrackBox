# TrackBox — Nginx reverse proxy
# Copy to /etc/nginx/sites-available/trackbox and symlink into sites-enabled.
server {
    listen 80;
    server_name your-domain.com;   # or "_" to serve on the bare IP

    # Frontend + API are both served by the app on 127.0.0.1:<APP_PORT>.
    # This port MUST match APP_PORT in /opt/trackbox/.env (default 8080).
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # A scrape lookup takes 10–45s; if the 2Captcha solver kicks in it can
        # take up to SOLVER_TIMEOUT (~180s). Keep this above that ceiling.
        proxy_connect_timeout 10s;
        proxy_read_timeout 210s;
        proxy_send_timeout 210s;
    }

    client_max_body_size 1m;
}
